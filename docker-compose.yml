services:
  drama-agent:
    build: .
    container_name: drama-multi-agent
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src
    volumes:
      - ./data/faiss_index:/app/data/faiss_index
      - ./data/sessions:/app/data/sessions
      - ./data/knowledge:/app/data/knowledge
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
