services:
  drama-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: drama-multi-agent:latest
    container_name: drama-agent
    restart: unless-stopped
    # 默认只绑定到 localhost，避免无意间暴露未鉴权接口；
    # 需要对外暴露时，使用反向代理（nginx / traefik）+ 鉴权层
    ports:
      - "127.0.0.1:8000:8000"
    # 从本地 .env 注入配置（.env 不会被打包进镜像）
    env_file:
      - .env
    volumes:
      - ./data:/app/data:rw
    command: python -m uvicorn drama_agent.api:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
